<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT Downloader - Futuristic Glass</title>
    <!-- Import Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #ff0000;
            --accent-glow: rgba(255, 0, 0, 0.6);
            --bg-dark: #0a0a0c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            color: white;
            padding: 20px;
        }

        /* --- BACKGROUND ANIMATION --- */
        .bg-animate {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #000000 100%);
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            animation: move 15s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-30%, -30%); }
            to { transform: translate(30%, 30%); }
        }

        /* --- SIDEBAR MENU --- */
        .menu-trigger {
            position: fixed;
            top: 30px;
            left: 30px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
            padding: 10px;
            transition: 0.4s;
        }

        .menu-trigger:hover {
            color: var(--accent);
            transform: scale(1.2) rotate(90deg);
        }

        .sidebar {
            position: fixed;
            left: -320px;
            top: 0;
            width: 300px;
            height: 100%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(25px);
            border-right: 1px solid var(--glass-border);
            z-index: 999;
            transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            display: flex;
            flex-direction: column;
            padding: 100px 25px;
            gap: 20px;
        }

        .sidebar.active {
            left: 0;
            box-shadow: 20px 0 80px rgba(0,0,0,0.8);
        }

        .side-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            text-align: left;
            font-size: 16px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .side-btn i { color: var(--accent); }

        .side-btn:hover {
            background: var(--accent);
            transform: translateX(10px);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* --- MAIN CONTAINER --- */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 40px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: slideUp 1s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- ANIMATED LOGO --- */
        .logo-box {
            position: relative;
            margin-bottom: 20px;
        }

        .yt-logo {
            font-size: 60px;
            color: var(--accent);
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 20px var(--accent-glow));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .glow-text {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- INPUT & BUTTON --- */
        .input-box {
            position: relative;
            margin: 25px 0;
        }

        input {
            width: 100%;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: white;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
        }

        .download-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(45deg, #ff0000, #990000);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 10px 25px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* --- RESULT SECTION --- */
        #resultArea {
            margin-top: 30px;
            display: none;
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .result-card {
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 15px;
            border: 1px solid var(--glass-border);
        }

        .thumbnail {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        .video-info h3 {
            font-size: 16px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-info p {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 15px;
        }

        .dl-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-action {
            padding: 12px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-video { background: #ff0000; }
        .btn-audio { background: #333; }
        .btn-action:hover { opacity: 0.8; transform: translateY(-2px); }

        /* Loader */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="bg-animate">
        <div class="blob"></div>
    </div>

    <div class="menu-trigger" onclick="toggleMenu()">
        <i class="fas fa-ellipsis-v"></i>
    </div>

    <nav class="sidebar" id="sidebar">
    <!-- Ganti href="link-tujuan.html" dengan link punyamu -->
    <a href="spotify.html" class="side-btn"><i class="fas fa-music"></i> YT DOWNLOADER</a>
    <a href="https://tik-dow-new-web.vercel.app/" class="side-btn"><i class="fas fa-bolt"></i> TT DOWNLOADER</a>
    <a href="https://instadow-byreza.vercel.app/" class="side-btn"><i class="fas fa-camera"></i> IG DOWNLOADER</a>
</nav>
    

    <div class="glass-card">
        <div class="logo-box">
            <i class="fab fa-youtube yt-logo"></i>
        </div>

        <h1>REZ<span class="glow-text">YTDOW</span></h1>
        <p style="opacity: 0.6; font-size: 14px;">YouTube Video Downloader </p>

        <div class="input-box">
            <input type="text" placeholder="Masukkan URL Video YouTube..." id="urlInput">
        </div>

        <button class="download-btn" id="analyzeBtn" onclick="analyzeVideo()">
            <div class="spinner" id="btnLoader"></div>
            <i class="fas fa-cloud-download-alt" id="btnIcon"></i> 
            <span id="btnText">CARI VIDEO</span>
        </button>

        <!-- Tempat Munculnya Hasil -->
        <div id="resultArea">
            <div class="result-card">
                <img src="" id="resThumb" class="thumbnail">
                <div class="video-info">
                    <h3 id="resTitle">Judul Video</h3>
                    <p id="resMeta">Durasi: - | Channel: -</p>
                </div>
                <div class="dl-links">
                    <a href="#" id="dlVideo" target="_blank" class="btn-action btn-video">
                        <i class="fas fa-video"></i> Video (MP4)
                    </a>
                    <a href="#" id="dlAudio" target="_blank" class="btn-action btn-audio">
                        <i class="fas fa-music"></i> Audio (MP3)
                    </a>
                </div>
            </div>
        </div>

        <div style="margin-top: 30px; display: flex; justify-content: center; gap: 20px; opacity: 0.5; font-size: 20px;">
            <i class="fab fa-chrome"></i>
            <i class="fab fa-edge"></i>
            <i class="fab fa-firefox"></i>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.querySelector('.menu-trigger i');
            sidebar.classList.toggle('active');
            if(sidebar.classList.contains('active')) {
                icon.classList.replace('fa-ellipsis-v', 'fa-times');
            } else {
                icon.classList.replace('fa-times', 'fa-ellipsis-v');
            }
        }

        async function analyzeVideo() {
            const urlInput = document.getElementById('urlInput').value;
            const btn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btnLoader = document.getElementById('btnLoader');
            const resultArea = document.getElementById('resultArea');

            if (!urlInput) {
                alert("Silakan masukkan URL YouTube terlebih dahulu!");
                return;
            }

            // UI State: Loading
            btn.disabled = true;
            btnText.innerText = "PROSES...";
            btnIcon.style.display = "none";
            btnLoader.style.display = "block";
            resultArea.style.display = "none";

            try {
                const response = await fetch(`https://api.sxtream.my.id/downloader/ytmp4?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.status === 200) {
                    // Update UI dengan data API
                    document.getElementById('resThumb').src = data.thumbnail;
                    document.getElementById('resTitle').innerText = data.title;
                    document.getElementById('resMeta').innerText = `Kualitas: ${data.quality} | Channel: ${data.channel}`;
                    
                    // Set Link Download
                    document.getElementById('dlVideo').href = data.video_url;
                    document.getElementById('dlAudio').href = data.audio_url;

                    // Tampilkan Area Hasil
                    resultArea.style.display = "block";
                } else {
                    alert("Gagal menganalisa video. Pastikan link benar.");
                }
            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan saat menghubungi server.");
            } finally {
                // Restore Button State
                btn.disabled = false;
                btnText.innerText = "ANALISA VIDEO";
                btnIcon.style.display = "block";
                btnLoader.style.display = "none";
            }
        }

        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const trigger = document.querySelector('.menu-trigger');
            if (!sidebar.contains(e.target) && !trigger.contains(e.target)) {
                sidebar.classList.remove('active');
                document.querySelector('.menu-trigger i').classList.replace('fa-times', 'fa-ellipsis-v');
            }
        });
    </script>
</body>
</html>
